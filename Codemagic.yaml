workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Get dependencies
        script: | 
          # إذا كان المشروع Flutter
          flutter packages pub get
      - name: Build Android APK
        script: | 
          # أمر البناء
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
