workflows:
  android-workflow:
    name: Auto Build APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Get dependencies
        script: | 
          flutter packages pub get
      - name: Build Android APK
        script: | 
          flutter build apk --debug --no-pub
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Antar7theman@gmail.com
